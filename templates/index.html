<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Variants Tester · 8407</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-orbs">
    <span class="orb o1"></span>
    <span class="orb o2"></span>
    <span class="orb o3"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="title">Variants Tester</div>
        <div class="sub">generate_reference_variants · port 8407</div>
      </div>
    </div>
    <div class="badge" id="serviceBadge">checking…</div>
  </header>

  <main class="layout">
    <section class="panel glass">
      <h2>Inputs</h2>
      <div class="dz-row">
        {% for i in range(1, 7) %}
          <div class="dz" data-slot="{{ i - 1 }}" id="dz{{ i - 1 }}">
            <input type="file" accept="image/*" hidden />
            <div class="dz-inner">
              <div class="dz-icon">+</div>
              <div class="dz-title">Image {{ i }}</div>
              <div class="dz-hint">{{ "required" if i == 1 else "optional" }}</div>
            </div>
            <img alt="" />
            <button class="dz-clear" type="button" hidden>×</button>
          </div>
        {% endfor %}
      </div>

      <button id="run" class="primary">
        <span class="btn-label">Run /run on 8407</span>
        <span class="spinner" hidden></span>
      </button>
      <div id="status" class="status"></div>

      <div class="meta" id="meta" hidden>
        <div><span class="k">Inputs:</span> <span id="m_in">—</span></div>
        <div><span class="k">Variants:</span> <span id="m_var">—</span></div>
        <div><span class="k">Success:</span> <span id="m_ok">—</span></div>
        <div><span class="k">Elapsed:</span> <span id="m_ms">—</span></div>
      </div>
    </section>

    <section class="panel glass result">
      <h2>Outputs</h2>
      <div class="grid" id="grid">
        <div class="placeholder">
          <div class="ph-glow"></div>
          <div class="ph-text">Run a request to see variants here</div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
